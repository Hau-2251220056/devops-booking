services:
  db:
    image: postgres:15
    container_name: booking-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: booking123
      POSTGRES_DB: booking
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: booking-backend
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env.docker
    environment:
      NODE_ENV: production
      FRONTEND_URL: https://devops-frontend-xi.vercel.app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: booking-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    restart: unless-stopped

volumes:
  db_data:
