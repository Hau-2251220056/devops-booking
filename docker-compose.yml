version: "3.9"

services:
  db:
    image: postgres:15
    container_name: booking-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: booking123
      POSTGRES_DB: booking
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: booking-backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - ./backend/.env.docker
    environment:
      NODE_ENV: development
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run dev"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: booking-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped

volumes:
  db_data:
